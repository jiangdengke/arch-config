# 备用字体示例，当前未启用。
# font_family      CaskaydiaCove Nerd Font Mono

# 终端主字体。
font_family      MesloLGL Nerd Font

# 中文 fallback。
symbol_map U+3000-U+303F,U+3400-U+4DBF,U+4E00-U+9FFF,U+F900-U+FAFF,U+20000-U+2A6DF,U+2A700-U+2B73F,U+2B740-U+2B81F,U+2B820-U+2CEAF LXGW WenKai Mono

# 强制 kitty 启动 zsh，即使继承到的 `$SHELL` 仍然是 bash。
shell /usr/bin/zsh

# 粗体字体。
bold_font        MesloLGL Nerd Font Bold

# 斜体字体。
italic_font      MesloLGL Nerd Font Italic

# 粗斜体字体。
bold_italic_font MesloLGL Nerd Font Bold Italic

# 背景透明度。
background_opacity 0.85

# 非活动窗口文本透明度，`1.0` 表示不额外变淡。
inactive_text_alpha 1.0

# 隐藏系统窗口边框和标题栏。
hide_window_decorations yes

# 光标拖尾效果示例，当前未启用。
# cursor_trail 1

# 关闭声音提示。
enable_audio_bell    no

# 字体大小。
font_size            12.0

# 窗口内容边距。
window_padding_width 0

# 关闭窗口时不弹确认框的示例，当前未启用。
#confirm_os_window_close 0

# 引入主题文件；主题配色单独维护在 `theme.conf`。
include theme.conf

# 提示：如果存在 `userprefs.conf`，它会在最后被引入；本文件中的设置优先于默认值。
