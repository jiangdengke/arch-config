# font_family      CaskaydiaCove Nerd Font Mono
font_family      MesloLGL Nerd Font

# Force kitty to start zsh even if $SHELL is inherited as bash.
shell /usr/bin/zsh

# 粗体字体
bold_font        MesloLGL Nerd Font Bold

# 斜体字体
italic_font      MesloLGL Nerd Font Italic

# 粗斜体字体
bold_italic_font MesloLGL Nerd Font Bold Italic

background_opacity 0.85
inactive_text_alpha 1.0
hide_window_decorations yes
# cursor_trail 1
enable_audio_bell    no
font_size            12.0
window_padding_width 0
#confirm_os_window_close 0

# initially empty, to be configured by user and remains static
include theme.conf

# Note: as userprefs.conf is included at the end, settings configured in this file will override the defaults
