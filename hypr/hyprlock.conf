$font_ui = LXGW WenKai Mono
$font_mono = MesloLGL Nerd Font

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 4, linear
    animation = fadeOut, 1, 4, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    noise = 0.0117
    contrast = 0.95
    brightness = 0.72
    vibrancy = 0.20
    vibrancy_darkness = 0.15
}

shape {
    monitor =
    size = 716, 492
    color = rgba(0, 0, 0, 0.32)
    rounding = 32
    position = 0, 16
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor =
    size = 716, 492
    color = rgba(25, 23, 36, 0.82)
    rounding = 32
    border_size = 2
    border_color = rgba(156, 207, 216, 0.28)
    position = 0, 0
    halign = center
    valign = center
    zindex = 1
}

shape {
    monitor =
    size = 112, 6
    color = rgba(156, 207, 216, 0.94)
    rounding = 999
    position = 0, -184
    halign = center
    valign = center
    zindex = 2
}

shape {
    monitor =
    size = 620, 132
    color = rgba(255, 255, 255, 0.05)
    rounding = 24
    position = 0, -4
    halign = center
    valign = center
    zindex = 2
}

shape {
    monitor =
    size = 108, 34
    color = rgba(38, 35, 58, 0.90)
    border_size = 1
    border_color = rgba(196, 167, 231, 0.28)
    rounding = 999
    position = 258, -182
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = 已锁定
    color = rgba(156, 207, 216, 0.98)
    font_size = 22
    font_family = $font_ui
    position = 0, -150
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = cmd[update:600000] sh -c 'printf "%s@%s" "$USER" "$(hostname -s)"'
    color = rgba(224, 222, 244, 0.92)
    font_size = 14
    font_family = $font_ui
    position = 0, -122
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = $TIME
    color = rgba(224, 222, 244, 0.98)
    font_size = 70
    font_family = $font_mono
    position = 0, -20
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = cmd[update:60000] date +"%Y年%m月%d日 %A"
    color = rgba(144, 140, 170, 0.96)
    font_size = 18
    font_family = $font_ui
    position = 0, 32
    halign = center
    valign = center
    zindex = 3
}

input-field {
    monitor =
    size = 620, 64
    outline_thickness = 2
    inner_color = rgba(31, 29, 46, 0.82)
    outer_color = rgba(156, 207, 216, 0.86) rgba(196, 167, 231, 0.86) 45deg
    check_color = rgba(156, 207, 216, 0.95) rgba(49, 116, 143, 0.95) 45deg
    fail_color = rgba(235, 111, 146, 0.95) rgba(246, 193, 119, 0.95) 45deg
    font_color = rgba(224, 222, 244, 0.96)
    fade_on_empty = false
    hide_input = false
    rounding = 20
    font_family = $font_mono
    placeholder_text = 输入密码以解锁
    fail_text = 密码错误
    check_text = 正在验证...
    dots_size = 0.34
    dots_spacing = 0.20
    dots_center = true
    position = 0, 114
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = 直接输入密码并回车解锁
    color = rgba(110, 106, 134, 0.94)
    font_size = 14
    font_family = $font_ui
    position = 0, 176
    halign = center
    valign = center
    zindex = 3
}

label {
    monitor =
    text = $LAYOUT
    color = rgba(196, 167, 231, 0.94)
    font_size = 13
    font_family = $font_ui
    position = 258, -182
    halign = center
    valign = center
    zindex = 3
}
