[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = false
show_symlink = true
linemode = "mtime"
scrolloff = 8
title_format = "{cwd}"

[preview]
wrap = "yes"
tab_size = 2
max_width = 1800
max_height = 1800
image_delay = 25
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
  { run = "$EDITOR %s", block = true, for = "unix" },
]
open = [
  { run = "xdg-open %s", desc = "Open", orphan = true, for = "linux" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { url = "*.json", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.yaml", use = "edit" },
  { url = "*.yml", use = "edit" },
  { url = "*.lua", use = "edit" },
  { url = "*.kdl", use = "edit" },
]

[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"
