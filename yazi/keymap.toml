# 按 l 时启用 smart-enter：目录进入，文件打开。
[[mgr.prepend_keymap]]
on = [ "l" ]
run = "plugin smart-enter"
desc = "Enter directory or open file"

# 按 M 打开挂载管理器。
[[mgr.prepend_keymap]]
on = [ "M" ]
run = "plugin mount"
desc = "Open mount manager"

# 按 p 使用 smart-paste：优先粘贴到当前悬停目录。
[[mgr.prepend_keymap]]
on = [ "p" ]
run = "plugin smart-paste"
desc = "Paste into hovered directory or CWD"

# 按 Y 复制选中项（或当前悬停项）的绝对路径文本到系统剪贴板。
[[mgr.prepend_keymap]]
on = [ "Y" ]
for = "linux"
run = 'shell -- eval "set -- %s"; [ "$#" -gt 0 ] || eval "set -- %h"; printf "%s\n" "$@" | wl-copy'
desc = "Copy selected paths to system clipboard"

# 按 fy 时，既执行 Yazi 内部 yank，也把文件列表写入系统剪贴板。
# 这里使用标准的 text/uri-list；支持它的桌面应用可以直接粘贴文件。
[[mgr.prepend_keymap]]
on = [ "f", "y" ]
for = "linux"
run = [
  'shell -- eval "set -- %s"; [ "$#" -gt 0 ] || eval "set -- %h"; for path in "$@"; do printf "file://%s\n" "$path"; done | wl-copy -t text/uri-list',
  "yank",
]
desc = "Yank files and copy file URIs to system clipboard"

# 按 cz 将当前悬停的文件或目录压缩成 tar.gz。
[[mgr.prepend_keymap]]
on = [ "c", "z" ]
run = 'shell --block -- set -- %h; path=$1; name=$(basename "$path"); dir=$(dirname "$path"); tar -C "$dir" -czf "$dir/$name.tar.gz" "$name"'
desc = "Compress hovered file or folder to tar.gz"

# 按 + 放大图片预览。
[[mgr.prepend_keymap]]
on = [ "+" ]
run = "plugin zoom 1"
desc = "Zoom in preview image"

# 按 - 缩小图片预览。
[[mgr.prepend_keymap]]
on = [ "-" ]
run = "plugin zoom -1"
desc = "Zoom out preview image"

# gh 快速回到家目录。
[[mgr.prepend_keymap]]
on = [ "g", "h" ]
run = "cd ~"
desc = "Cd to home"

# gc 快速进入 ~/.config。
[[mgr.prepend_keymap]]
on = [ "g", "c" ]
run = "cd ~/.config"
desc = "Cd to ~/.config"

# gd 快速进入下载目录。
[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd ~/Downloads"
desc = "Cd to ~/Downloads"

# gp 快速进入图片目录。
[[mgr.prepend_keymap]]
on = [ "g", "p" ]
run = "cd ~/Pictures"
desc = "Cd to ~/Pictures"

# gy 快速进入 Yazi 自己的配置目录。
[[mgr.prepend_keymap]]
on = [ "g", "y" ]
run = "cd ~/.config/yazi"
desc = "Cd to Yazi config"
