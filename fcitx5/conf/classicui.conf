# ClassicUI configuration (user override).
#
# This file lives at:
#   ~/.config/fcitx5/conf/classicui.conf
#
# Note: We can't reload fcitx5 via DBus from the sandbox; restart fcitx5 to apply.

# Theme selection (try both keys for compatibility across builds).
Theme=macOS-dark
ThemeName=macOS-dark

# Keep the theme's own accent colors.
UseAccentColor=False

# Font tuning.
# Use a dedicated fontconfig alias so the fallback order stays stable.
Font=Fcitx UI 13
MenuFont=Fcitx UI 13
TrayFont=Fcitx UI 11

# Usability tweaks.
WheelForPaging=True

# Candidate list layout (key name differs between versions; keep both).
VerticalCandidateList=False
Vertical Candidate List=False
